<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/src/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>Andres Insuasty</title>
</head>

<body class="font-Ubuntu">
    <section class="w-full p-8 flex" id="perfil">
        <div class="w-2/5">
            <img class="rounded-3xl shadow-lg" src="img/andres.jpg" alt="foto_perfil">
        </div>
        <div class="w-3/5 ml-3 items-center">
            <div class="" id="perfil_texto">
                <h1 class="text-center text-2xl font-semibold text-primario">Andres Insuasty</h1>
                <p class="text-center font-normal text-xs">Soy un cientifico de datos que le gusta aprender, enseñar y
                    aplicar innovaciones en
                    tecnologia e industria</p>
            </div>
            <div class="justify-center flex" id="redes_sociales">
                <a href="https://twitter.com/AndresIns10"><img class="w-5 m-1" src="img/twitter.png" alt="twitter"></a>
                <a href="https://www.instagram.com/andresinsuasty10/"><img class="w-5 m-1" src="img/instagram.png"
                        alt="instagram"></a>
                <a href="https://www.linkedin.com/in/andres-insuasty-d/"><img class="w-5 m-1" src="img/linkedin.png"
                        alt="linkedin"></a>
                <a href="https://github.com/AndresInsuasty"><img class="w-5 m-1" src="img/github.png" alt="github"></a>
            </div>
        </div>
    </section>
    <section id="mis_cursos">
        <div class="text-center text-xl font-medium text-primario">
            <h1>Mis Cursos</h1>
        </div>
        <div class="w-auto h-64 items-center overflow-x-auto overscroll-x-contain flex flex-row space-x-6 overflow-y-hidden">
            <div class="Card bg-secundario">
                <img class="rounded-lg" src="img/curso_knime.png" alt="curso_knime">
                <h3 class="text-white text-center mt-2">Knime de novato a avanzado</h3>
                <div class="items-center justify-center flex mt-4" id="iconos_puntuacion">
                    <img class="w-6" src="img/estrella.png" alt="estrella">
                    <p class="text-white">5.0</p>
                    <img class="w-5 h-5 ml-2 mr-1" src="img/reloj.png" alt="reloj">
                    <p class="text-white" >6h</p>
                </div>
            </div>
            <div class="Card bg-terciario">
                <img class="rounded-lg" src="img/finanzas_personales.png" alt="finanzas_personales">
                <h3 class="text-white text-center mt-2">Analítica en Finanzas Personales</h3>
                <div class="items-center justify-center flex mt-4" id="iconos_puntuacion">
                    <img class="w-6" src="img/estrella.png" alt="estrella">
                    <p class="text-white">4.30</p>
                    <img class="w-5 h-5 ml-2 mr-1" src="img/reloj.png" alt="reloj">
                    <p class="text-white" >4h</p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
